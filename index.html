<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to My GitHub</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background-color: #24292e;
      color: white;
      padding: 2rem 1rem;
    }
    h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    p {
      font-size: 1.2rem;
      color: #ccc;
    }
    .projects {
      padding: 2rem;
    }
    footer {
      margin-top: 3rem;
      color: #666;
      font-size: 0.9rem;
    }
    button {
      background-color: #2ea44f;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background-color: #22863a;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My GitHub Repository</h1>
    <p>Explore my projects and contributions below.</p>
    <button onclick="visitGithub()">Visit My GitHub</button>
  </header>

  <section class="projects">
    <!-- You can add embedded project cards here later -->
    <p style="color: #444;">More projects coming soon...</p>
  </section>

  <footer>
    &copy; 2025 MUGISHA Pascal | All Rights Reserved
  </footer>

  <script>
    function visitGithub() {
      window.open("https://github.com/MUGISHA-Pascal", "_blank");
    }
  </script>

</body>
</html>
